name: JavaDoc

on:
  push:
    branches: [ "master", "main" ]

jobs:
  javadoc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
      - name: Generate JavaDoc
        run: mvn javadoc:javadoc