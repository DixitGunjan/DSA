name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
      - name: Build Release
        run: mvn clean package -DskipTests
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: target/*.jar